baseURL = "https://fan-pengfei.top/"
locale = "zh-cn"
title = "Rancho's Notes"
theme = "PaperMod"

pagination.pagerSize = 10
enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  description = "Aal Izz Well —— Rancho 的技术笔记与思考"
  author = "Rancho"
  defaultTheme = "auto"        # auto / light / dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false

  [params.homeInfoParams]
    Title = "Aal Izz Well 👋"
    Content = "我是 Rancho。这里记录我的技术笔记与思考。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 30
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40

# 搜索功能需要的输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]
